spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/hexbound}
    username: ${SPRING_DATASOURCE_USERNAME:hexbound}
    password: ${SPRING_DATASOURCE_PASSWORD:hexbound}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  jackson:
    serialization.write-dates-as-timestamps: false
management.endpoints.web.exposure.include: health,info
springdoc.swagger-ui.path: /swagger-ui.html
